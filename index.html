<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Multi Torpedó</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --ocean: #0284c7;
            --ship: #475569;
            --hit: #ef4444;
            --miss: #cbd5e1;
            --text: #f8fafc;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .lobby, .setup-screen, .game-container { background: var(--panel); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-top: 15px; }
        .hidden { display: none !important; }
        input, button { padding: 10px; font-size: 1rem; border-radius: 4px; border: none; margin: 5px; }
        input { background: #334155; color: white; }
        button { background: #0284c7; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0369a1; }
        .boards { display: flex; gap: 30px; flex-wrap: wrap; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(10, 32px); gap: 2px; background: #334155; padding: 2px; }
        .cell { width: 32px; height: 32px; background: var(--ocean); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .cell.ship { background: var(--ship); }
        .cell.hit { background: var(--hit); }
        .cell.hit::after { content: '✕'; color: white; }
        .cell.miss { background: var(--miss); }
        .cell.miss::after { content: '•'; color: #0f172a; font-size: 1.5rem; }
        .enemy .cell.ship { background: var(--ocean); } /* Elrejti az ellenség hajóit */
        #status { font-size: 1.2rem; font-weight: bold; margin: 15px; color: #f59e0b; }
    </style>
</head>
<body>

    <h1>Online Torpedó</h1>
    <div id="status">Kapcsolódás a hálózathoz...</div>

    <div id="lobby-screen" class="lobby hidden">
        <h3>Csatlakozás játékhoz</h3>
        <p>A te neved/ID-d: <strong id="my-id" style="color:#38bdf8">...</strong></p>
        <hr style="border-color:#334155">
        <label>Írd be a partnered ID-ját:</label><br>
        <input type="text" id="peer-id-input" placeholder="Partner ID-ja">
        <button id="connect-btn">Kapcsolódás</button>
    </div>

    <div id="setup-screen" class="setup-screen hidden">
        <h3>Helyezd el a hajóidat!</h3>
        <p>Kattints a bal oldali táblára a hajóid (5 db négyzet) lerakásához.</p>
        <p>Lerakva: <span id="placed-count">0</span> / 5</p>
        <button id="ready-btn" disabled style="background:#64748b;">Készen állok</button>
    </div>

    <div id="game-screen" class="game-container hidden">
        <div class="boards">
            <div>
                <h4>Saját flottád</h4>
                <div id="my-grid" class="grid"></div>
            </div>
            <div>
                <h4>Ellenséges terület (Ide lőj)</h4>
                <div id="enemy-grid" class="grid enemy"></div>
            </div>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 10;
        let peer = null;
        let conn = null;
        
        let myShips = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let enemyShipsPlaced = false;
        let myShipsPlacedCount = 0;
        
        let myShots = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        let enemyShots = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        
        let amIHost = false;
        let myTurn = false;
        let gameStarted = false;

        // PeerJS inicializálása (Véletlenszerű szobaszámot generál)
        const randomId = 'torpedo-' + Math.floor(1000 + Math.random() * 9000);
        peer = new Peer(randomId);

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status').innerText = "Válassz: Küldd el az ID-d a barátodnak, vagy írd be az övét!";
            document.getElementById('lobby-screen').classList.remove('hidden');
        });

        // Ha valaki csatlakozik hozzánk (Mi vagyunk a Host-ok)
        peer.on('connection', (connection) => {
            conn = connection;
            amIHost = true;
            setupConnection();
        });

        // Ha mi csatlakozunk valakihez
        document.getElementById('connect-btn').addEventListener('click', () => {
            const targetId = document.getElementById('peer-id-input').value.trim();
            if(targetId) {
                document.getElementById('status').innerText = "Kapcsolódás...";
                conn = peer.connect(targetId);
                amIHost = false;
                setupConnection();
            }
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('lobby-screen').classList.add('hidden');
                document.getElementById('setup-screen').classList.remove('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('status').innerText = "Sikeres kapcsolat! Pakold le a hajóidat.";
                myTurn = amIHost; // A kihívó (Host) kezd majd
                buildSetupGrid();
            });

            // Bejövő adatok kezelése játék közben
            conn.on('data', (data) => {
                if (data.type === 'READY') {
                    enemyShipsPlaced = true;
                    checkGameStart();
                }
                if (data.type === 'SHOT') {
                    handleEnemyShot(data.r, data.c);
                }
                if (data.type === 'RESULT') {
                    handleShotResult(data.r, data.c, data.result, data.won);
                }
            });
        }

        // Hajóelhelyezési rács felépítése
        function buildSetupGrid() {
            const myGrid = document.getElementById('my-grid');
            myGrid.innerHTML = '';
            for(let r=0; r<BOARD_SIZE; r++) {
                for(let c=0; c<BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.addEventListener('click', () => {
                        if(gameStarted) return;
                        if(myShips[r][c] === 0 && myShipsPlacedCount < 5) {
                            myShips[r][c] = 1;
                            cell.classList.add('ship');
                            myShipsPlacedCount++;
                        } else if(myShips[r][c] === 1) {
                            myShips[r][c] = 0;
                            cell.classList.remove('ship');
                            myShipsPlacedCount--;
                        }
                        document.getElementById('placed-count').innerText = myShipsPlacedCount;
                        document.getElementById('ready-btn').disabled = myShipsPlacedCount !== 5;
                        document.getElementById('ready-btn').style.background = myShipsPlacedCount === 5 ? '#10b981' : '#64748b';
                    });
                    myGrid.appendChild(cell);
                }
            }
            // Ellenség üres táblájának előkészítése
            buildEnemyGrid();
        }

        function buildEnemyGrid() {
            const enemyGrid = document.getElementById('enemy-grid');
            enemyGrid.innerHTML = '';
            for(let r=0; r<BOARD_SIZE; r++) {
                for(let c=0; c<BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.addEventListener('click', () => {
                        if(!gameStarted || !myTurn || myShots[r][c] !== 0) return;
                        // Lövés küldése a másiknak
                        conn.send({ type: 'SHOT', r: r, c: c });
                        myTurn = false;
                        document.getElementById('status').innerText = "A másik játékosra vársz... ⏳";
                    });
                    enemyGrid.appendChild(cell);
                }
            }
        }

        // Készen áll gomb megnyomása
        document.getElementById('ready-btn').addEventListener('click', () => {
            document.getElementById('setup-screen').classList.add('hidden');
            conn.send({ type: 'READY' });
            myShipsPlacedCount = -1; // lezárva
            checkGameStart();
        });

        function checkGameStart() {
            if(myShipsPlacedCount === -1 && enemyShipsPlaced) {
                gameStarted = true;
                updateTurnStatus();
            } else {
                document.getElementById('status').innerText = "Várakozás a másik játékos hajóira... ⏳";
            }
        }

        function updateTurnStatus() {
            if(myTurn) {
                document.getElementById('status').innerText = "🔴 TE JÖSSZ! Támadj!";
            } else {
                document.getElementById('status').innerText = "A másik játékosra vársz... ⏳";
            }
        }

        // Amikor az ELLENSÉG lő belénk
        function handleEnemyShot(r, c) {
            let isHit = myShips[r][c] === 1;
            enemyShots[r][c] = isHit ? 3 : 2;
            
            // Frissítsük a saját táblánkat a képernyőn
            const index = r * BOARD_SIZE + c;
            const myCells = document.getElementById('my-grid').children;
            myCells[index].classList.add(isHit ? 'hit' : 'miss');

            // Megnézzük vesztettünk-e
            let lost = true;
            for(let i=0; i<BOARD_SIZE; i++) {
                for(let j=0; j<BOARD_SIZE; j++) {
                    if(myShips[i][j] === 1 && enemyShots[i][j] !== 3) lost = false;
                }
            }

            // Visszaküldjük az eredményt a lövőnek
            conn.send({ type: 'RESULT', r: r, c: c, result: isHit ? 'HIT' : 'MISS', won: lost });

            if(lost) {
                document.getElementById('status').innerText = "❌ Vesztettél! Az összes hajód elsüllyedt.";
                gameStarted = false;
            } else {
                myTurn = true; // Mi jövünk, mert ő lőtt
                updateTurnStatus();
            }
        }

        // Amikor megkapjuk a MI LÖVÉSÜNK eredményét
        function handleShotResult(r, c, result, enemyWon) {
            myShots[r][c] = result === 'HIT' ? 3 : 2;
            
            const index = r * BOARD_SIZE + c;
            const enemyCells = document.getElementById('enemy-grid').children;
            enemyCells[index].classList.add(result === 'HIT' ? 'hit' : 'miss');

            if(enemyWon) {
                document.getElementById('status').innerText = "🎉 GYŐZELEM! Elsüllyesztetted az összes hajóját!";
                gameStarted = false;
            } else {
                // A torpedó szabály szerint: ha találtál, újra te jössz, ha mellé, a másik jön
                myTurn = (result === 'HIT');
                updateTurnStatus();
            }
        }
    </script>
</body>
</html>
